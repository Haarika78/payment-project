<!DOCTYPE html>
<html>
<head>
    <title>Payment System</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 100px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>💳 Payment System</h1>
        <p>Buy Product - ₹500</p>

        <form action="/checkout" method="POST">
            <button type="submit">Pay Now</button>
        </form>

        <a href="/history">📊 View History</a>
        <a href="/logout">🚪 Logout</a>
    </div>
</div>

</body>
</html>
