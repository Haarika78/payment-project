<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f8;
            text-align: center;
        }

        table {
            margin: 50px auto;
            border-collapse: collapse;
            width: 60%;
            background: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        a {
            display: block;
            margin-top: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h2>📊 Payment History</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Amount</th>
        <th>Status</th>
    </tr>

    {% for t in transactions %}
    <tr>
        <td>{{ t[0] }}</td>
        <td>₹{{ t[1] }}</td>
        <td>{{ t[2] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/">⬅ Back</a>

</body>
</html>
